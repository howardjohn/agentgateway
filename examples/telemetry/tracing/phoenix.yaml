# yaml-language-server: $schema=../../../schema/local.json
# Run Phoenix with: `docker run -p 6006:6006 -p 4317:4317 -i -t arizephoenix/phoenix:latest`
config:
  tracing:
    otlpEndpoint: http://localhost:4317
    randomSampling: true
    fields:
      add:
        span.name: '"openai.chat"'
        openinference.span.kind: '"LLM"'
        llm.system: 'llm.provider'
        llm.input_messages: 'flatten_recursive(llm.prompt.map(c, {"message": c}))'
        llm.output_messages: |
          flatten_recursive(
            has(llm.toolCalls) ?
              [{"message": {"role":"assistant", "tool_calls": llm.toolCalls.map(c, {"tool_call": c})}}] :
              llm.completion.map(c, {"message": {"role":"assistant", "content": c}})
          )
        llm.token_count.completion: 'llm.outputTokens'
        llm.token_count.prompt: 'llm.inputTokens'
        llm.token_count.total: 'llm.totalTokens'
        llm.model_name: 'llm.responseModel'
        llm.invocation_parameters: 'to_json(llm.params)'
binds:
- port: 3000
  listeners:
  - routes:
    - backends:
       - ai:
          name: gemini
          provider:
              gemini:
                # Optional; overrides the model in requests
                model: gemini-1.5-flash
      policies:
        backendAuth:
          key: $GEMINI_API_KEY