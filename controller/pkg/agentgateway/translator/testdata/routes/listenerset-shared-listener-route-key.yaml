apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: nondisruptive-listenerset-conflict
  namespace: default
spec:
  gatewayClassName: agentgateway
  allowedListeners:
    namespaces:
      from: Same
  listeners:
  - name: gateway-listener
    port: 80
    protocol: HTTP
---
apiVersion: gateway.networking.k8s.io/v1
kind: ListenerSet
metadata:
  name: nondisruptive-ls-alpha
  namespace: default
spec:
  parentRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: nondisruptive-listenerset-conflict
  listeners:
  - name: shared-listener
    port: 80
    protocol: HTTP
    allowedRoutes:
      namespaces:
        from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: ListenerSet
metadata:
  name: nondisruptive-ls-beta
  namespace: default
spec:
  parentRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: nondisruptive-listenerset-conflict
  listeners:
  - name: shared-listener
    port: 80
    protocol: HTTP
    allowedRoutes:
      namespaces:
        from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: nondisruptive-conflict-route
  namespace: default
spec:
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: ListenerSet
    name: nondisruptive-ls-alpha
  - group: gateway.networking.k8s.io
    kind: ListenerSet
    name: nondisruptive-ls-beta
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /test
    backendRefs:
    - name: infra-backend-v1
      port: 8080

