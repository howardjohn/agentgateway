apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: static-h2c
  namespace: default
spec:
  static:
    host: h2c.example.com
    port: 8080
    appProtocol: h2c
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: static-http1
  namespace: default
spec:
  static:
    host: http1.example.com
    port: 8080
    appProtocol: http/1.1
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: static-a2a
  namespace: default
spec:
  static:
    host: a2a.example.com
    port: 9090
    appProtocol: a2a
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: static-tcp
  namespace: default
spec:
  static:
    host: tcp.example.com
    port: 9000
    appProtocol: tcp
